<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade Prática - Mini Ecommerce</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Mini Ecommerce - Catálogo</h1>
    </header>

    <div id="controls">
        <input type="text" id="search" placeholder="Buscar por nome...">
        
        <select id="category"></select>

        <button id="btnRender">Renderizar</button>
    </div>

    <main>
        <div id="product-list"></div>
        <hr>
        <div id="product-details">
            <h3>Detalhes do Produto</h3>
            <p>Clique em "Ver detalhes" para saber mais.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
